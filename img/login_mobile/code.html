<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-container": "#6ab2fe",
                        "on-error": "#ffffff",
                        "surface-container-highest": "#e1e3e3",
                        "on-secondary-container": "#004474",
                        "secondary": "#0061a3",
                        "surface-container-low": "#f2f4f4",
                        "surface-container": "#eceeee",
                        "on-surface-variant": "#3e4946",
                        "on-primary-fixed-variant": "#005045",
                        "on-error-container": "#93000a",
                        "on-tertiary": "#ffffff",
                        "tertiary-fixed-dim": "#f0c110",
                        "secondary-fixed-dim": "#9ecaff",
                        "tertiary-fixed": "#ffe08b",
                        "primary-fixed": "#9df2e0",
                        "surface": "#f8fafa",
                        "secondary-fixed": "#d1e4ff",
                        "inverse-primary": "#81d6c4",
                        "on-secondary-fixed": "#001d36",
                        "tertiary-container": "#d0a600",
                        "surface-container-high": "#e6e8e9",
                        "on-tertiary-container": "#4f3d00",
                        "error": "#ba1a1a",
                        "inverse-on-surface": "#eff1f1",
                        "inverse-surface": "#2e3131",
                        "surface-variant": "#e1e3e3",
                        "outline": "#6e7976",
                        "on-background": "#191c1d",
                        "on-primary": "#ffffff",
                        "error-container": "#ffdad6",
                        "background": "#f8fafa",
                        "outline-variant": "#bec9c5",
                        "surface-dim": "#d8dada",
                        "on-tertiary-fixed": "#241a00",
                        "tertiary": "#745b00",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed-dim": "#81d6c4",
                        "on-primary-fixed": "#00201b",
                        "primary-container": "#1B7A6B",
                        "primary": "#006053",
                        "on-tertiary-fixed-variant": "#584400",
                        "on-surface": "#191c1d",
                        "on-secondary-fixed-variant": "#00497c",
                        "on-primary-container": "#b0ffed",
                        "surface-bright": "#f8fafa",
                        "on-secondary": "#ffffff",
                        "surface-tint": "#006b5d"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.75rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                }
            }
        }
    </script>
<style>
        .glass-effect {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        input:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(27, 122, 107, 0.2);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col items-center justify-center p-6 selection:bg-primary-fixed">
<div class="w-full max-w-sm flex flex-col items-center">
<header class="mb-12 text-center">
<div class="flex items-center justify-center mb-6">
<div class="w-16 h-16 bg-primary-container rounded-xl flex items-center justify-center shadow-xl shadow-primary-container/20">
<span class="material-symbols-outlined text-on-primary-container text-4xl" data-icon="medical_services">medical_services</span>
</div>
</div>
<h1 class="font-headline text-3xl font-extrabold tracking-tighter text-on-background mb-2">APP-DX</h1>
<p class="text-on-surface-variant font-medium tracking-tight">BTS Integral</p>
</header>
<main class="w-full">
<div class="glass-effect rounded-xl p-8 shadow-2xl shadow-on-background/5 border border-white/40">
<form class="space-y-6" onsubmit="return false;">
<div class="space-y-2">
<label class="block text-sm font-semibold text-on-surface-variant px-1" for="email">Correo electrónico</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg group-focus-within:text-primary-container transition-colors" data-icon="alternate_email">alternate_email</span>
</div>
<input class="w-full h-14 pl-12 pr-4 bg-surface-container-low border-none rounded-xl text-on-surface placeholder:text-outline/60 font-medium transition-all focus:bg-surface-container-lowest" id="email" name="email" placeholder="nombre@ejemplo.com" type="email"/>
</div>
</div>
<div class="space-y-2">
<label class="block text-sm font-semibold text-on-surface-variant px-1" for="password">Contraseña</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg group-focus-within:text-primary-container transition-colors" data-icon="lock">lock</span>
</div>
<input class="w-full h-14 pl-12 pr-12 bg-surface-container-low border-none rounded-xl text-on-surface placeholder:text-outline/60 font-medium transition-all focus:bg-surface-container-lowest" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-outline hover:text-on-surface-variant" type="button">
<span class="material-symbols-outlined text-lg" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<div class="text-right">
<a class="text-sm font-semibold text-primary hover:text-primary-container transition-colors" href="#">¿Olvidaste tu contraseña?</a>
</div>
<button class="w-full h-14 bg-primary-container text-white font-bold rounded-xl shadow-lg shadow-primary-container/30 hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
<span>Entrar</span>
<span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
</div>
<div class="mt-8 text-center">
<p class="text-on-surface-variant font-medium">
                    ¿No tienes una cuenta? 
                    <a class="text-primary font-bold hover:underline underline-offset-4 ml-1" href="#">Crear cuenta</a>
</p>
</div>
</main>
<footer class="mt-16 w-full flex flex-col items-center">
<div class="w-32 h-1 bg-surface-container-highest rounded-full mb-8"></div>
<div class="flex gap-6 opacity-40 grayscale">
<div class="w-10 h-10 rounded-full bg-slate-400/20 flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="shield_with_heart">shield_with_heart</span>
</div>
<div class="w-10 h-10 rounded-full bg-slate-400/20 flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="verified_user">verified_user</span>
</div>
</div>
<p class="mt-4 text-[10px] text-outline font-bold tracking-widest uppercase">Clinical Sanctuary Design System</p>
</footer>
</div>
<div class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none opacity-50">
<div class="absolute top-[-10%] right-[-10%] w-[40%] h-[40%] bg-primary/5 blur-[100px] rounded-full"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[40%] h-[40%] bg-secondary/5 blur-[100px] rounded-full"></div>
</div>
</body></html>
