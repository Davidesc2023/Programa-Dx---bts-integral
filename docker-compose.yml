version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: lab_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lab_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lab_pass}
      POSTGRES_DB: ${POSTGRES_DB:-lab_db}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-lab_user} -d ${POSTGRES_DB:-lab_db}']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lab_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-lab_user}:${POSTGRES_PASSWORD:-lab_pass}@db:5432/${POSTGRES_DB:-lab_db}
    ports:
      - '${PORT:-3000}:3000'
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    volumes:
      - uploads_data:/app/uploads

volumes:
  postgres_data:
  uploads_data:
